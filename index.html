<!DOCTYPE html>
<html lang="ja">
<head>
    <style>
        body { background: #000; color: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; font-family: sans-serif; }
        #display { font-size: 20vw; font-weight: bold; }
        #controls { margin-top: 20px; }
        button { font-size: 2rem; padding: 20px 40px; cursor: pointer; }
    </style>
</head>
<body>
    <div id="display">00:00</div>
    <div id="controls">
        <button onclick="toggleTimer()" id="toggleBtn">START</button>
        <button onclick="resetTimer()">RESET</button>
    </div>

    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <script>
        // IDは固定で変えない
        const ROOM_ID = 'radio-unique-id-123';
        const role = new URLSearchParams(window.location.search).get('role');
        const peer = new Peer(role === 'master' ? ROOM_ID : null);
        let conn, time = 0, timer = null;

        peer.on('open', () => {
            if (role === 'slave') {
                conn = peer.connect(ROOM_ID);
                conn.on('data', data => { time = data; updateDisplay(); });
            }
        });

        peer.on('connection', c => { conn = c; });

        function updateDisplay() {
            const m = Math.floor(time / 60);
            const s = time % 60;
            document.getElementById('display').innerText = 
                String(m).padStart(2, '0') + ":" + String(s).padStart(2, '0');
        }

        function toggleTimer() {
            if (timer) {
                clearInterval(timer); timer = null;
                document.getElementById('toggleBtn').innerText = "START";
            } else {
                timer = setInterval(() => {
                    time++; updateDisplay();
                    if (conn) conn.send(time);
                }, 1000);
                document.getElementById('toggleBtn').innerText = "STOP";
            }
        }

        function resetTimer() {
            time = 0; updateDisplay();
            if (conn) conn.send(time);
        }
    </script>
</body>
</html>
