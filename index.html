<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Radio Timer</title>
    <style>
        body { background: #000; color: #0f0; font-family: monospace; text-align: center; }
        #display { font-size: 15vw; margin: 20px 0; }
        button { font-size: 20px; padding: 15px; margin: 5px; }
    </style>
</head>
<body>
    <div id="display">00:00:00</div>
    <div id="controls" style="display:none;">
        <div>
            <button onclick="addTime(10)">+10秒</button>
            <button onclick="addTime(60)">+1分</button>
        </div>
        <button onclick="toggleTimer()" id="toggleBtn">START</button>
        <button onclick="resetTimer()">RESET</button>
    </div>

    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <script>
        const role = new URLSearchParams(window.location.search).get('role');
        const peer = new Peer(role === 'master' ? 'radio-unique-id-123' : null);
        let conn, time = 0, timer = null;

        peer.on('open', () => { if(role === 'slave') conn = peer.connect('radio-unique-id-123'); });
        peer.on('connection', c => {
            conn = c;
            if(role === 'master') document.getElementById('controls').style.display = 'block';
            conn.on('data', data => { time = data.time; updateDisplay(); });
        });

        function updateDisplay() {
            const h = Math.floor(time / 3600);
            const m = Math.floor((time % 3600) / 60);
            const s = time % 60;
            document.getElementById('display').innerText = 
                [h,m,s].map(v => String(v).padStart(2, '0')).join(':');
        }

        function addTime(sec) { time += sec; updateDisplay(); if(conn) conn.send({time: time}); }
        
        function toggleTimer() {
            if (timer) {
                clearInterval(timer); timer = null;
                document.getElementById('toggleBtn').innerText = "START";
            } else {
                timer = setInterval(() => {
                    if(time > 0) time--;
                    updateDisplay();
                    if(conn) conn.send({time: time});
                }, 1000);
                document.getElementById('toggleBtn').innerText = "STOP";
            }
        }
        function resetTimer() { 
            time = 0; updateDisplay(); 
            if(conn) conn.send({time: time});
            if(timer) { clearInterval(timer); timer = null; document.getElementById('toggleBtn').innerText = "START"; }
        }
    </script>
</body>
</html>
