<!DOCTYPE html>
<html lang="ja">
<body>
    <div id="display" style="font-size: 50px;">Waiting...</div>
    <div id="controls" style="display:none;">
        <button onclick="conn.send('テスト成功！')">テスト送信</button>
    </div>

    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <script>
        const role = new URLSearchParams(window.location.search).get('role');
        const peer = new Peer(role === 'master' ? 'radio-unique-id-123' : null);
        let conn;

        peer.on('open', id => {
            if (role === 'slave') {
                conn = peer.connect('radio-unique-id-123');
                conn.on('data', data => {
                    document.getElementById('display').innerText = data; // 受信したら表示
                });
            }
        });

        peer.on('connection', c => {
            conn = c;
            document.getElementById('controls').style.display = 'block'; // 繋がったらボタン出す
            document.getElementById('display').innerText = "接続済み";
        });
    </script>
</body>
</html>
