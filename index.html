<!DOCTYPE html>
<html lang="ja">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
    body { margin: 0; font-family: sans-serif; background: #0f172a; color: #e2e8f0; display: flex; justify-content: center; align-items: center; height: 100vh; }
    .container { text-align: center; }
    #display { font-size: 80px; font-weight: bold; margin-bottom: 30px; }
    
    /* 接続ステータスのデザイン */
    #status { position: fixed; bottom: 20px; right: 20px; font-size: 14px; font-weight: bold; padding: 5px 10px; border-radius: 5px; }
    .status-connected { color: #22c55e; border: 1px solid #22c55e; }
    .status-connecting { color: #eab308; border: 1px solid #eab308; }
    .status-unlink { color: #ef4444; border: 1px solid #ef4444; }
</style>
</head>
<body>

<div class="container">
    <div id="display">00:00</div>
    <div id="controls" style="display: none;">
        <button onclick="toggleTimer()" id="toggleBtn">START</button>
        <button onclick="resetTimer()">RESET</button>
    </div>
</div>

<div id="status" class="status-unlink">UNLINK</div>

<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<script>
    const role = new URLSearchParams(window.location.search).get('role');
    const peer = new Peer(role === 'master' ? 'my-x7k2b9qLp1m8r4tW-radio-id-2026-xyzjolf' : null);
    const statusEl = document.getElementById('status');
    let conn, time = 0, timer = null;

    function setStatus(text, className) {
        statusEl.innerText = text;
        statusEl.className = className;
    }

    function connectToMaster() {
        setStatus("CONNECTING...", "status-connecting");
        conn = peer.connect('my-x7k2b9qLp1m8r4tW-radio-id-2026-xyzjolf');
        
        conn.on('open', () => {
            setStatus("CONNECTED", "status-connected");
        });

        conn.on('data', data => {
            time = data;
            updateDisplay();
        });

        conn.on('close', () => {
            setStatus("UNLINK", "status-unlink");
            setTimeout(connectToMaster, 5000); // 5秒後に再接続
        });
    }

    peer.on('open', () => {
        if (role === 'slave') connectToMaster();
    });

    peer.on('connection', c => {
        conn = c;
        document.getElementById('controls').style.display = 'block';
        setStatus("CONNECTED", "status-connected");
        c.on('close', () => setStatus("UNLINK", "status-unlink"));
    });

    function updateDisplay() {
        const m = Math.floor(time / 60);
        const s = time % 60;
        document.getElementById('display').innerText = 
            String(m).padStart(2, '0') + ":" + String(s).padStart(2, '0');
    }

    function toggleTimer() {
        if (timer) {
            clearInterval(timer); timer = null;
            document.getElementById('toggleBtn').innerText = "START";
        } else {
            timer = setInterval(() => {
                time++; updateDisplay();
                if (conn) conn.send(time);
            }, 1000);
            document.getElementById('toggleBtn').innerText = "STOP";
        }
    }

    function resetTimer() {
        time = 0; updateDisplay();
        if (conn) conn.send(time);
    }
</script>
</body>
</html>
