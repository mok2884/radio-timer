<!DOCTYPE html>
<html lang="ja">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #0f172a;
        color: #e2e8f0;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    .container {
        text-align: center;
    }

    #display {
        font-size: 80px;
        font-weight: bold;
        margin-bottom: 30px;
        letter-spacing: 2px;
    }

    #controls {
        display: none;
    }

    button {
        font-size: 20px;
        padding: 12px 24px;
        margin: 8px;
        border: none;
        border-radius: 12px;
        cursor: pointer;
        transition: 0.2s;
    }

    #toggleBtn {
        background: #22c55e;
        color: white;
    }

    #toggleBtn:hover {
        background: #16a34a;
    }

    button:nth-child(2) {
        background: #ef4444;
        color: white;
    }

    button:nth-child(2):hover {
        background: #dc2626;
    }

    button:active {
        transform: scale(0.95);
    }
</style>
</head>

<body>
<div class="container">
    <div id="display">00:00</div>

    <div id="controls">
        <button onclick="toggleTimer()" id="toggleBtn">START</button>
        <button onclick="resetTimer()">RESET</button>
    </div>
</div>

<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<script>
    const role = new URLSearchParams(window.location.search).get('role');
    const peer = new Peer(role === 'master' ? 'radio-unique-id-123' : null);
    let conn, time = 0, timer = null;

    peer.on('open', () => {
        if (role === 'slave') {
            conn = peer.connect('radio-unique-id-123');
            conn.on('data', data => {
                time = data;
                updateDisplay();
            });
        }
    });

    peer.on('connection', c => {
        conn = c;
        document.getElementById('controls').style.display = 'block';
    });

    function updateDisplay() {
        const m = Math.floor(time / 60);
        const s = time % 60;
        document.getElementById('display').innerText = 
            String(m).padStart(2, '0') + ":" + String(s).padStart(2, '0');
    }

    function toggleTimer() {
        if (timer) {
            clearInterval(timer);
            timer = null;
            document.getElementById('toggleBtn').innerText = "START";
        } else {
            timer = setInterval(() => {
                time++;
                updateDisplay();
                if (conn) conn.send(time);
            }, 1000);
            document.getElementById('toggleBtn').innerText = "STOP";
        }
    }

    function resetTimer() {
        time = 0;
        updateDisplay();
        if (conn) conn.send(time);
    }
</script>

</body>
</html>
