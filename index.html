<!DOCTYPE html>
<html lang="ja">
<body>
    <div id="display" style="font-size: 50px;">00:00</div>
    <div id="controls" style="display:none;">
        <button onclick="sendTime()">1秒進める</button>
    </div>

    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <script>
        const role = new URLSearchParams(window.location.search).get('role');
        const peer = new Peer(role === 'master' ? 'radio-unique-id-123' : null);
        let conn, time = 0;

        peer.on('open', () => {
            if (role === 'slave') {
                conn = peer.connect('radio-unique-id-123');
                conn.on('data', data => {
                    time = data;
                    document.getElementById('display').innerText = time;
                });
            }
        });

        peer.on('connection', c => {
            conn = c;
            document.getElementById('controls').style.display = 'block';
        });

        function sendTime() {
            time += 1;
            document.getElementById('display').innerText = time;
            if (conn) conn.send(time);
        }
    </script>
</body>
</html>
