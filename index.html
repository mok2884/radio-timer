<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Slave Timer</title>
    <link href="https://fonts.cdnfonts.com/css/ds-digital" rel="stylesheet">
    <style>
        body { margin: 0; background: #000; color: #ff4500; height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; font-family: 'DS-Digital', monospace; }

        /* 業務用ストップウォッチ風：数字の固定枠レイアウト */
        #display {
            display: flex;
            align-items: center;
            justify-content: center;
            border: 4px solid #FFFFFF;
            border-radius: 20px;
            padding: 35px 55px;
            background: rgba(255, 255, 255, 0.05);
        }

        .digit-group { display: flex; align-items: center; }
        
        .digit {
            width: 80px;
            text-align: center;
            display: inline-block;
            font-size: 11rem;
            color: #ff4500;
            text-shadow: 0 0 15px #ff4500;
        }

        .separator {
            width: 40px;
            text-align: center;
            font-size: 8rem;
            color: #ff4500;
            margin: 0 10px;
        }

        /* 親機専用：コントロールエリア */
        #uiArea { margin-top: 50px; text-align: center; }
        button { padding: 20px 40px; font-size: 24px; background: #333; color: white; border: none; border-radius: 10px; cursor: pointer; }
    </style>
</head>
<body>

<div id="display">
    <div class="digit-group">
        <span class="digit" id="h1">0</span><span class="digit" id="h2">0</span>
        <span class="separator">:</span>
        <span class="digit" id="m1">0</span><span class="digit" id="m2">0</span>
        <span class="separator">:</span>
        <span class="digit" id="s1">0</span><span class="digit" id="s2">0</span>
    </div>
</div>

<div id="uiArea" style="display: none;">
    <button onclick="toggleTimer()">START / STOP</button>
</div>

<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<script>
    const role = new URLSearchParams(window.location.search).get('role');
    const MASTER_ID = 'radio-secret-id-998877665544332211';
    const peer = new Peer(role === 'master' ? MASTER_ID : null);
    let conn, time = 0, timer = null;

    if (role === 'master') document.getElementById('uiArea').style.display = 'block';

    function updateDisplayView(t) {
        const h = Math.floor(t / 3600);
        const m = Math.floor((t % 3600) / 60);
        const s = t % 60;
        
        const str = String(h).padStart(2, '0') + String(m).padStart(2, '0') + String(s).padStart(2, '0');
        document.getElementById('h1').innerText = str[0];
        document.getElementById('h2').innerText = str[1];
        document.getElementById('m1').innerText = str[2];
        document.getElementById('m2').innerText = str[3];
        document.getElementById('s1').innerText = str[4];
        document.getElementById('s2').innerText = str[5];
    }

    function toggleTimer() {
        if (timer) { clearInterval(timer); timer = null; }
        else {
            timer = setInterval(() => {
                time++;
                updateDisplayView(time);
                if (conn) conn.send({type: 'time', value: time});
            }, 1000);
        }
    }

    // 接続処理
    peer.on('open', () => { if(role === 'slave') connectToMaster(); });
    
    function connectToMaster() {
        conn = peer.connect(MASTER_ID);
        conn.on('data', data => {
            if(data.type === 'time') {
                // 林さんのこだわり：1秒足して800ms遅らせる
                setTimeout(() => updateDisplayView(data.value + 1), 800);
            }
        });
        conn.on('close', () => setTimeout(connectToMaster, 3000));
    }

    peer.on('connection', c => {
        conn = c;
        c.on('data', data => { if(data.type === 'time') updateDisplayView(data.value); });
    });
</script>
</body>
</html>
