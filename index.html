<!DOCTYPE html>
<html lang="ja">
<head>
<link href="https://fonts.cdnfonts.com/css/ds-digital" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@700;900&display=swap" rel="stylesheet">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
    body { margin: 0; font-family: sans-serif; background: #0f172a; color: #e2e8f0; 
          display: flex; justify-content: center; align-items: center; height: 100dvh; overflow: hidden; flex-direction: column; }
    .container { text-align: center; }
    
    #display {
    display: flex;
    align-items: center;
    justify-content: center;

   font-size: 18vw;
    font-family: 'DS-Digital', monospace;

    border: 4px solid #FFFFFF;
    border-radius: 20px;

    padding: 35px 55px;
    background: rgba(255,255,255,0.05);

    margin-bottom: 20px;
}
.digit {
    width: 80px;
    text-align: right;
    display: inline-block;
    margin: 0 8px;
    font-style: italic;
    color: #ff4500;
}

.separator {
    width: 45px;
    text-align: center;
    display: inline-block;
    color: #ff0000;
    font-size: 0.8em;
}
    
    .control-row { margin-bottom: 20px; }
    .control-btn { background: #1e293b; padding: 12px 24px; border: none; border-radius: 8px; color: white; cursor: pointer; margin: 0 5px; }
    
    #inputPreview { font-size: 32px; color: #94a3b8; margin-bottom: 10px; font-family: monospace; }
    
    .keypad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; width: 280px; margin: 0 auto; }
    button { padding: 15px; font-size: 18px; border: none; border-radius: 8px; cursor: pointer; background: #334155; color: white; }
    button:active { transform: scale(0.95); }
    .action-btn { background: #475569; }

    #status {  font-size: 14px; font-weight: bold; padding: 5px 10px; border-radius: 5px; }


    .mainRow {
    display: flex;
    gap: 16px;
    align-items: flex-start;
}

.rightPanel {
    display:flex;
    flex-direction:column;
    gap:10px;
    margin-left: -2px;
}
.keypad button{
    font-size: 24px; font-weight: 900;
    height: 75px;
}
.resetBtn {
    height: 75px; background: #556577;
    color: white;
    font-weight: 900;
}

.startBtn {
    height: 225px; /* 75px × 3段分 */
    background: #f8f8f4;
    color: #000;
    font-weight: 900;
}
    .status-connected { color: #22c55e; border: 1px solid #22c55e; }
    .status-connecting { color: #eab308; border: 1px solid #eab308; }
    .status-unlink { color: #ef4444; border: 1px solid #ef4444; }
#slaveLabel {
    font-size: 34px;
    font-weight: 900;
    font-family: 'Roboto', sans-serif;
}
.setRow {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin-bottom: 10px;
}

.setBtn {
    background: #0f766e;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-weight: 900;
    height: 75px;
    font-size: 18px;
}
    .disabled {
    background: #334155 !important;
    color: #94a3b8 !important;
    cursor: not-allowed;
    opacity: 0.6;
}
</style>
</head>
<body>
<div id="tapToConnect" style="position:fixed; inset:0; background:rgba(15, 23, 42, 0.8); display:none; justify-content:center; align-items:center; z-index:9999; cursor:pointer;">
    
    <div id="tapText" style="color:white; font-size:40px; font-weight:bold;">
        TAP TO CONNECT
    </div>

</div>

<div class="container">
    <div id="displayGroup">
   <div id="display">
    <span class="digit">0</span>
    <span class="digit">0</span>
    <span class="separator">:</span>

    <span class="digit">0</span>
    <span class="digit">0</span>
    <span class="separator">:</span>

    <span class="digit">0</span>
    <span class="digit">0</span>
</div>
<div id="slaveLabel">
    REAL TIME / TIMER
</div>
        <div id="status" class="status-unlink">UNLINK</div>
        </div>

    
    <div id="uiArea" style="display: none;">
       
               <div class="setRow">
    <div id="inputPreview">--:--:--</div>
   
</div>

        <div class="mainRow">
        <div class="keypad">
            <button onclick="press(1)">1</button><button onclick="press(2)">2</button><button onclick="press(3)">3</button>
            <button onclick="press(4)">4</button><button onclick="press(5)">5</button><button onclick="press(6)">6</button>
            <button onclick="press(7)">7</button><button onclick="press(8)">8</button><button onclick="press(9)">9</button>
            <button onclick="clearInput()" class="action-btn">CLR</button>
            <button onclick="press(0)">0</button>
            <button onclick="setTimer()" class="setBtn" style="font-size: 16px;">TIME SET</button>
        </div>
<div class="rightPanel">
    <button class="resetBtn" onclick="resetTimer()">set ZERO</button>
    <button class="startBtn" onclick="toggleTimer()">START / STOP</button>
</div>
</div>

            
    </div>
</div>



<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<script>
    const role = new URLSearchParams(window.location.search).get('role');
    if (role === 'master') {
    const display = document.getElementById('display');

    display.style.fontSize = '7rem';
    display.style.padding = '16px 20px';
    display.style.border = '3px solid #FFFFFF';

    const digits = document.querySelectorAll('.digit');
    digits.forEach(d => {
        d.style.width = '50px';
        d.style.margin = '0 5px';
    });

    document.querySelectorAll('.separator').forEach(s => {
        s.style.width = '28px';
    });
}
    const MASTER_ID = 'radio-secret-id-Zyxw-Vuts-9821-Kjhl'; 
    const peer = new Peer(role === 'master' ? MASTER_ID : null);
    
    let conn, time = 0, timer = null, inputBuffer = "";
    let seq = 0;
    let startTime = 0;
let savedBuffer = "";
let editing = false;
    let wakeLock = null;

    // 操作エリアを表示する関数
    function showControls() {
        if (role === 'master') {
            document.getElementById('uiArea').style.display = 'block';
        }
    }

   function press(n) {

    if (!editing) {
        inputBuffer = "";
        editing = true;
    }

    if (inputBuffer.length < 6) {
        inputBuffer += n;
        updatePreview();
    }
}
    function clearInput() {
    inputBuffer = "";
    savedBuffer = "";
    editing = false;
    updatePreview();
}
   function updatePreview() {

    const source =
        inputBuffer !== ""
            ? inputBuffer
            : savedBuffer;

    if (source === "") {
        document.getElementById('inputPreview').innerText = "--:--:--";
        return;
    }

    const d = source.padStart(6, '0');

    document.getElementById('inputPreview').innerText =
        d.slice(0,2) + ":" + d.slice(2,4) + ":" + d.slice(4,6);
}

    function setTimer() {
        if (timer) return;
        if(inputBuffer.length === 0) return;
        const total = parseInt(inputBuffer.padStart(6, '0'));
        const h = Math.floor(total / 10000);
        const m = Math.floor((total % 10000) / 100);
        const s = total % 100;
        time = h * 3600 + m * 60 + s;
        updateDisplay();
        savedBuffer = inputBuffer;
editing = false;
updatePreview();
        if (conn) conn.send({type: 'time', value: time});
    }

  async function keepScreenAwake() {
    try {
        if ('wakeLock' in navigator) {
            wakeLock = await navigator.wakeLock.request('screen');
        }
    } catch (err) {
        console.log(err);
    }
}

function updateDisplay() {

    const h = Math.floor(time / 3600);
    const m = Math.floor((time % 3600) / 60);
    const s = time % 60;

    const txt =
        String(h).padStart(2,'0') +
        String(m).padStart(2,'0') +
        String(s).padStart(2,'0');

    const digits =
        document.querySelectorAll('#display .digit');

    for(let i=0;i<6;i++){
        digits[i].innerText = txt[i];
    }
}

    function toggleTimer() {

    const resetBtn = document.querySelector('.resetBtn');
    const setBtn = document.querySelector('.setBtn');

    if (timer) {
        clearInterval(timer);
        timer = null;

        // ボタンを元に戻す
        resetBtn.classList.remove('disabled');
        setBtn.classList.remove('disabled');

    } else {
        startTime = Date.now() - (time * 1000);

        timer = setInterval(() => {
            time = Math.floor((Date.now() - startTime) / 1000);
            updateDisplay();
            if (conn) conn.send({type: 'time', value: time, seq: seq++});

        }, 200);

        // ボタンを暗くする
        resetBtn.classList.add('disabled');
        setBtn.classList.add('disabled');
    }
}

    function resetTimer() { 
if (timer) return;
    clearInterval(timer);
    timer = null;
    time = 0;
    startTime = Date.now();
    updateDisplay();

    setTimeout(() => {
        if (conn) conn.send({type: 'time', value: time});
    }, 50);
}


    const statusEl = document.getElementById('status');
    function setStatus(text, className) { statusEl.innerText = text; statusEl.className = className; }

    function connectToMaster() {
        setStatus("CONNECTING...", "status-connecting");
        conn = peer.connect(MASTER_ID);
        conn.on('open', () => { setStatus("CONNECTED", "status-connected"); /* 子機は controls を表示しない */ });
       let lastUpdateTime = 0;
        let lastReceived = 0;

let lastSeq = -1;

conn.on('data', data => {
    if (data.type === 'time') {
        if (data.seq < lastSeq) return;
        lastSeq = data.seq;

        time = data.value;
        updateDisplay();
    }
});
        conn.on('close', () => { setStatus("UNLINK", "status-unlink"); setTimeout(connectToMaster, 3000); });
    }

   peer.on('open', () => {
    if (role === 'slave') {
        const overlay = document.getElementById('tapToConnect');
        overlay.style.display = 'flex'; // ボタンを表示
        overlay.addEventListener('click', () => {
            overlay.style.display = 'none'; // ボタンを隠す
            connectToMaster();
        }, { once: true });
    }
});
    peer.on('connection', c => {
        conn = c; 
        showControls(); // 親機だけ操作エリアが出る
        setStatus("CONNECTED", "status-connected");
        c.on('data', data => { if(data.type === 'time') { time = data.value; updateDisplay(); } });
    });
if(role === 'slave'){

    const displayGroup = document.getElementById('displayGroup');

    displayGroup.style.position = 'absolute';
    displayGroup.style.top = '50%';
    displayGroup.style.left = '50%';

    displayGroup.style.transform =
        'translate(-50%, -50%) rotate(90deg) scale(0.6)';

    displayGroup.style.transformOrigin = 'center center';

}

      document.addEventListener('pointerdown', () => {
    if (!wakeLock) keepScreenAwake();
}, { once: true });

document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible') {
        keepScreenAwake();
    }
});
</script>
<video autoplay muted loop playsinline width="1" height="1">
    <source src="https://interactive-examples.mdn.mozilla.net/media/cc0-videos/flower.mp4" type="video/mp4">
</video>
    
</body>
</html>
