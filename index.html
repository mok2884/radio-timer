<!DOCTYPE html>
<html lang="ja">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
    body { margin: 0; font-family: sans-serif; background: #0f172a; color: #e2e8f0; display: flex; justify-content: center; align-items: center; height: 100vh; flex-direction: column; }
    .container { text-align: center; }
    #display { font-size: 80px; font-weight: bold; margin-bottom: 5px; }
    #inputPreview { font-size: 24px; color: #94a3b8; margin-bottom: 20px; height: 30px; }

    .keypad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; width: 200px; margin-left: auto; margin-right: auto; }
    button { padding: 15px; font-size: 18px; border: none; border-radius: 8px; cursor: pointer; background: #334155; color: white; transition: 0.2s; }
    button:active { transform: scale(0.95); }
    .action-btn { background: #475569; }
    .control-btn { background: #1e293b; padding: 12px 24px; }

    #status { position: fixed; bottom: 20px; right: 20px; font-size: 14px; font-weight: bold; padding: 5px 10px; border-radius: 5px; }
    .status-connected { color: #22c55e; border: 1px solid #22c55e; }
    .status-connecting { color: #eab308; border: 1px solid #eab308; }
    .status-unlink { color: #ef4444; border: 1px solid #ef4444; }
</style>
</head>
<body>

<div class="container">
    <div id="display">00:00</div>
    <div id="inputPreview">--:--</div>
    
    <div id="uiArea" style="display: none;">
        <div class="keypad">
            <button onclick="press(1)">1</button><button onclick="press(2)">2</button><button onclick="press(3)">3</button>
            <button onclick="press(4)">4</button><button onclick="press(5)">5</button><button onclick="press(6)">6</button>
            <button onclick="press(7)">7</button><button onclick="press(8)">8</button><button onclick="press(9)">9</button>
            <button onclick="clearInput()" class="action-btn">CLR</button>
            <button onclick="press(0)">0</button>
            <button onclick="setTimer()" class="action-btn">SET</button>
        </div>
        <div>
            <button onclick="toggleTimer()" id="toggleBtn" class="control-btn">START</button>
            <button onclick="resetTimer()" class="control-btn">RESET</button>
        </div>
    </div>
</div>

<div id="status" class="status-unlink">UNLINK</div>

<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<script>
    const role = new URLSearchParams(window.location.search).get('role');
    // IDはここを長くて複雑なものに書き換えてね！
    const MASTER_ID = 'radio-secret-id-998877665544332211'; 
    const peer = new Peer(role === 'master' ? MASTER_ID : null);
    
    let conn, time = 0, timer = null, inputBuffer = "";

    // テンキー操作
    function press(n) { if(inputBuffer.length < 4) { inputBuffer += n; updatePreview(); } }
    function clearInput() { inputBuffer = ""; updatePreview(); }
    function updatePreview() {
        const d = inputBuffer.padStart(4, '0');
        document.getElementById('inputPreview').innerText = d.slice(0,2) + ":" + d.slice(2,4);
    }

    function setTimer() {
        if(inputBuffer.length === 0) return;
        const total = parseInt(inputBuffer.padStart(4, '0'));
        const m = Math.floor(total / 100);
        const s = total % 100;
        time = m * 60 + s;
        updateDisplay();
        inputBuffer = ""; updatePreview();
        if (conn) conn.send({type: 'time', value: time});
    }

    // タイマー操作
    function updateDisplay() {
        const m = Math.floor(time / 60);
        const s = time % 60;
        document.getElementById('display').innerText = String(m).padStart(2, '0') + ":" + String(s).padStart(2, '0');
    }

    function toggleTimer() {
        if (timer) {
            clearInterval(timer); timer = null;
            document.getElementById('toggleBtn').innerText = "START";
        } else {
            timer = setInterval(() => {
                if (time > 0) { time--; updateDisplay(); if (conn) conn.send({type: 'time', value: time}); }
                else { clearInterval(timer); timer = null; document.getElementById('toggleBtn').innerText = "START"; }
            }, 1000);
            document.getElementById('toggleBtn').innerText = "STOP";
        }
    }

    function resetTimer() {
        clearInterval(timer); timer = null; time = 0; updateDisplay();
        document.getElementById('toggleBtn').innerText = "START";
        if (conn) conn.send({type: 'time', value: time});
    }

    // 通信管理
    const statusEl = document.getElementById('status');
    function setStatus(text, className) { statusEl.innerText = text; statusEl.className = className; }

    function connectToMaster() {
        setStatus("CONNECTING...", "status-connecting");
        conn = peer.connect(MASTER_ID);
        conn.on('open', () => { setStatus("CONNECTED", "status-connected"); document.getElementById('uiArea').style.display = 'block'; });
        conn.on('data', data => { if(data.type === 'time') { time = data.value; updateDisplay(); } });
        conn.on('close', () => { setStatus("UNLINK", "status-unlink"); setTimeout(connectToMaster, 3000); });
    }

    peer.on('open', () => { if(role === 'slave') connectToMaster(); });
    peer.on('connection', c => {
        conn = c; document.getElementById('uiArea').style.display = 'block';
        setStatus("CONNECTED", "status-connected");
        c.on('data', data => { if(data.type === 'time') { time = data.value; updateDisplay(); } });
    });
</script>
</body>
</html>
